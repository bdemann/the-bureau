<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C41E3A" />
    <meta name="description" content="Patriotic task management for the conscientious citizen." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <title>Clear — BCR</title>
    <style>
      /* ── Skin custom properties — BCR Clear defaults ────────────────────────
         These are the canonical BCR colour values. Any skin that defines
         cssVars will override individual entries at runtime via
         document.documentElement.style.setProperty().
         CSS custom properties pierce shadow DOM boundaries so all components
         pick up overrides automatically.
         ──────────────────────────────────────────────────────────────────── */
      :root {
        /* Brand */
        --color-primary:        #1B2A4A;
        --color-primary-hover:  #243a63;
        --color-primary-rgb:    27, 42, 74;

        /* Surfaces */
        --color-surface:        #F5EFE0;
        --color-card:           #FDFAF5;
        --color-input-bg:       #FFFDF7;

        /* Text */
        --color-text:           #2C2C2C;
        --color-text-muted:     #6B6B6B;
        --color-text-faint:     #9E9E9E;

        /* Semantic */
        --color-danger:         #C41E3A;
        --color-danger-dark:    #8B0000;
        --color-danger-rgb:     196, 30, 58;
        --color-warning:        #B8860B;
        --color-success:        #2E7D32;
        --color-success-dark:   #245826;
        --color-snooze:         #E8821A;

        /* Chrome — header/nav bar background and its text color.
           Both stay constant in dark mode: chrome is always dark, its text always cream. */
        --color-chrome:         #1B2A4A;
        --color-chrome-text:    #F5EFE0;

        /* Borders & tints — use these instead of hardcoded rgba(0,0,0,X) */
        --color-surface-tint:   rgba(0, 0, 0, 0.05);
        --color-border-subtle:  rgba(0, 0, 0, 0.10);
        --color-border:         rgba(0, 0, 0, 0.15);
        --color-border-strong:  rgba(0, 0, 0, 0.25);

        /* Typography */
        --font-display:         'Bebas Neue', sans-serif;
        --font-mono:            'Courier Prime', monospace;
        --font-accent:          'Special Elite', serif;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background-color: var(--color-surface);
      }
      body {
        font-family: var(--font-mono);
        -webkit-font-smoothing: antialiased;
      }
      bureau-app {
        display: block;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <bureau-app></bureau-app>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
